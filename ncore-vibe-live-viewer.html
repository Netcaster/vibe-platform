<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCORE 2027 — Join Live Session</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --deep: #0b1e28; --navy: #112533; --card: #17303e;
  --ocean: #17a186; --light: #1ec9a8; --glow: #f39e14;
  --text: #cdf0ea; --muted: #4d8a80;
  --border: rgba(23,161,134,0.22); --radius: 12px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Outfit','Segoe UI',sans-serif; background: #010810; color: var(--text); display: flex; flex-direction: column; }

/* ── JOIN SCREEN ── */
.join-screen {
  position: fixed; inset: 0; background: #010810;
  display: flex; align-items: center; justify-content: center; z-index: 300; padding: 24px;
}
.join-card {
  background: #0a1c35; border: 1px solid rgba(23,161,134,0.3); border-radius: 24px;
  padding: 44px; max-width: 480px; width: 100%; text-align: center;
}
.join-live-badge {
  display: inline-flex; align-items: center; gap: 8px; background: rgba(220,38,38,0.2);
  border: 1px solid rgba(220,38,38,0.4); border-radius: 100px; padding: 6px 16px;
  font-size: 13px; font-weight: 700; color: #f87171; margin-bottom: 20px;
}
@keyframes livepulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: livepulse 1.8s infinite; }
.join-session-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.join-host { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
.preview-box {
  aspect-ratio: 16/9; background: #000; border-radius: 14px; overflow: hidden;
  margin-bottom: 24px; position: relative; display: flex; align-items: center; justify-content: center;
}
.preview-box video { width: 100%; height: 100%; object-fit: cover; }
.preview-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg,var(--ocean),var(--light)); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #fff; }
.preview-name-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-align: left; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.name-input { width: 100%; background: #071428; border: 1px solid rgba(23,161,134,0.22); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 15px; padding: 14px 18px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
.name-input:focus { border-color: var(--ocean); box-shadow: 0 0 0 3px rgba(23,161,134,0.12); }
.name-input::placeholder { color: var(--muted); }
.cam-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.cam-toggle { display: flex; align-items: center; gap: 8px; background: rgba(13,32,64,0.8); border: 1px solid rgba(23,161,134,0.2); border-radius: 10px; padding: 10px 16px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text); transition: all 0.2s; }
.cam-toggle.off { border-color: rgba(220,38,38,0.3); color: #f87171; background: rgba(30,10,10,0.8); }
.cam-toggle:hover { border-color: rgba(23,161,134,0.4); }
.join-btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; background: linear-gradient(135deg,var(--ocean),var(--light)); color: #010810; transition: all 0.2s; }
.join-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(23,161,134,0.4); }

/* ── TOP BAR ── */
.topbar { height: 52px; background: rgba(5,14,31,0.95); border-bottom: 1px solid rgba(23,161,134,0.15); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 10; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.05em; }
.session-name { font-size: 14px; font-weight: 600; }
.live-badge { display: flex; align-items: center; gap: 7px; background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.4); border-radius: 100px; padding: 3px 10px; font-size: 11px; font-weight: 700; color: #f87171; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.viewer-ct { font-size: 13px; color: var(--muted); }

/* ── ROOM BODY ── */
.room-body { flex: 1; display: flex; overflow: hidden; }
.video-area { flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 10px; overflow: hidden; }

/* ── MAIN PRESENTER VIDEO ── */
.presenter-wrap { flex: 1; background: #000; border-radius: 14px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
.presenter-wrap video { width: 100%; height: 100%; object-fit: cover; }
.presenter-label { position: absolute; bottom: 12px; left: 12px; background: rgba(5,14,31,0.85); backdrop-filter: blur(6px); border-radius: 8px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.host-badge { font-size: 10px; background: rgba(23,161,134,0.3); border-radius: 4px; padding: 2px 6px; color: var(--light); }
.presenter-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg,var(--ocean),var(--light)); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; color: #fff; }
.waiting-msg { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.waiting-msg p { color: var(--muted); font-size: 15px; }

/* ── SELF PiP ── */
.self-pip { position: absolute; bottom: 12px; right: 12px; width: 140px; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; border: 2px solid rgba(23,161,134,0.4); background: #0a1c35; display: flex; align-items: center; justify-content: center; }
.self-pip video { width: 100%; height: 100%; object-fit: cover; }
.pip-avatar { font-size: 18px; font-weight: 700; color: #fff; }

/* ── SIDEBAR ── */
.sidebar-panel { width: 0; overflow: hidden; transition: width 0.25s ease; flex-shrink: 0; background: rgba(5,14,31,0.95); border-left: 1px solid rgba(23,161,134,0.12); display: flex; flex-direction: column; }
.sidebar-panel.open { width: 280px; }
.panel-tabs { display: flex; border-bottom: 1px solid rgba(23,161,134,0.12); flex-shrink: 0; }
.panel-tab { flex: 1; padding: 13px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); border: none; background: none; font-family: inherit; transition: all 0.2s; }
.panel-tab.active { color: var(--light); border-bottom: 2px solid var(--light); }
.panel-body { flex: 1; overflow-y: auto; padding: 14px; }
.participant-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(23,161,134,0.07); }
.participant-item:last-child { border-bottom: none; }
.p-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.p-name { font-size: 13px; flex: 1; }
.chat-messages { display: flex; flex-direction: column; gap: 10px; }
.chat-msg .sender { font-size: 11px; font-weight: 700; color: var(--light); margin-bottom: 3px; }
.chat-msg .body { font-size: 13px; background: rgba(13,32,64,0.8); border-radius: 10px 10px 10px 2px; padding: 8px 12px; line-height: 1.4; }
.chat-msg.self .sender { color: #4ade80; text-align: right; }
.chat-msg.self .body { background: rgba(22,163,74,0.12); border-radius: 10px 10px 2px 10px; text-align: right; }
.chat-input-wrap { display: flex; gap: 8px; padding: 10px 0 0; border-top: 1px solid rgba(23,161,134,0.12); margin-top: 8px; flex-shrink: 0; }
.chat-input { flex: 1; background: rgba(7,20,40,0.8); border: 1px solid rgba(23,161,134,0.22); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
.chat-input:focus { border-color: var(--ocean); }
.chat-input::placeholder { color: var(--muted); }
.send-btn { background: linear-gradient(135deg,var(--ocean),var(--light)); border: none; border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; flex-shrink: 0; }

/* ── CONTROLS ── */
.controls { height: 72px; background: rgba(5,14,31,0.97); border-top: 1px solid rgba(23,161,134,0.12); display: flex; align-items: center; justify-content: center; gap: 10px; flex-shrink: 0; padding: 0 20px; }
.ctrl-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: rgba(13,32,64,0.8); border: 1px solid rgba(23,161,134,0.2); border-radius: 12px; padding: 9px 16px; cursor: pointer; transition: all 0.2s; font-family: inherit; color: var(--text); min-width: 58px; }
.ctrl-btn:hover { background: rgba(211,84,0,0.1); border-color: rgba(23,161,134,0.4); }
.ctrl-btn.off { background: rgba(30,10,10,0.8); border-color: rgba(220,38,38,0.3); color: #f87171; }
.ctrl-btn .icon { font-size: 20px; line-height: 1; }
.ctrl-btn .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
.ctrl-hand { background: rgba(250,204,21,0.1); border-color: rgba(250,204,21,0.3); color: #facc15; }
.ctrl-hand:hover { background: rgba(250,204,21,0.2); }
.ctrl-hand.raised { background: rgba(250,204,21,0.2); border-color: #facc15; }
.ctrl-leave { background: rgba(220,38,38,0.12); border-color: rgba(220,38,38,0.35); color: #f87171; margin-left: 16px; }
.ctrl-leave:hover { background: rgba(220,38,38,0.25); }
.toast { position: fixed; bottom: 84px; right: 24px; background: #0a1c35; border: 1px solid rgba(23,161,134,0.3); border-radius: 12px; padding: 13px 18px; display: none; align-items: center; gap: 10px; font-size: 13px; z-index: 999; animation: fi 0.3s ease; }
@keyframes fi { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<!-- ── JOIN SCREEN ── -->
<div class="join-screen" id="joinScreen">
  <div class="join-card">
    <div class="join-live-badge">
      <div class="live-dot"></div>
      LIVE NOW
    </div>
    <div class="join-session-title" id="jsTitle">Opening Keynote: Race, Equity & Institutional Transformation</div>
    <div class="join-host">with NCORE 2027 · ARIA Las Vegas</div>
    <div class="preview-box" id="previewBox">
      <div class="preview-avatar" id="previewAvatar"></div>
    </div>
    <div class="preview-name-label">Your display name</div>
    <input class="name-input" id="viewerName" placeholder="Enter your name…" value="" />
    <div class="cam-row">
      <button class="cam-toggle" id="joinCamBtn" onclick="toggleJoinCam()">📹 Camera On</button>
      <button class="cam-toggle" id="joinMicBtn" onclick="toggleJoinMic()">🎤 Mic On</button>
    </div>
    <button class="join-btn" onclick="joinSession()">Join Session →</button>
  </div>
</div>

<!-- ── TOP BAR ── -->
<div class="topbar" style="display:none" id="topbar">
  <div class="topbar-left">
    <div class="logo">◈ NCORE 2027</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="session-name">Opening Keynote: Race, Equity & Institutional Transformation · FitPro Academy</div>
  </div>
  <div class="topbar-right">
    <div class="viewer-ct">👥 <span id="viewerCount">24</span> viewers</div>
  </div>
</div>

<!-- ── ROOM BODY ── -->
<div class="room-body" style="display:none" id="roomBody">
  <div class="video-area">
    <!-- Main presenter view -->
    <div class="presenter-wrap" id="presenterWrap">
      <video id="presenterVideo" autoplay playsinline style="display:none"></video>
      <div class="waiting-msg" id="waitingMsg">
        <div class="presenter-avatar">NC</div>
        <p>Waiting for host to start their video…</p>
      </div>
      <div class="presenter-label" id="presenterLabel" style="display:none">
        FitPro Academy <span class="host-badge">HOST</span>
      </div>
      <!-- Self PiP -->
      <div class="self-pip" id="selfPip">
        <video id="selfPipVideo" autoplay muted playsinline style="display:none"></video>
        <div class="pip-avatar" id="pipAvatar"></div>
      </div>
    </div>
  </div>

  <!-- ── SIDEBAR PANEL ── -->
  <div class="sidebar-panel" id="sidePanel">
    <div class="panel-tabs">
      <button class="panel-tab active" id="tabP" onclick="switchTab('p')">👥 Viewers</button>
      <button class="panel-tab" id="tabC" onclick="switchTab('c')">💬 Chat</button>
    </div>
    <div class="panel-body" id="panelP">
      <div id="viewerList"></div>
    </div>
    <div class="panel-body" id="panelC" style="display:none;padding-bottom:0;flex-direction:column;height:100%">
      <div style="display:flex;flex-direction:column;height:100%">
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-wrap">
          <input class="chat-input" id="chatInput" placeholder="Message…" onkeydown="sendOnEnter(event)" />
          <button class="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── CONTROLS ── -->
<div class="controls" style="display:none" id="controlBar">
  <button class="ctrl-btn" id="btnMic" onclick="toggleMic()">
    <span class="icon" id="micIcon">🎤</span>
    <span class="lbl" id="micLbl">Mute</span>
  </button>
  <button class="ctrl-btn" id="btnCam" onclick="toggleCam()">
    <span class="icon" id="camIcon">📹</span>
    <span class="lbl" id="camLbl">Stop Video</span>
  </button>
  <button class="ctrl-btn ctrl-hand" id="btnHand" onclick="raiseHand()">
    <span class="icon">✋</span>
    <span class="lbl" id="handLbl">Raise Hand</span>
  </button>
  <button class="ctrl-btn" onclick="togglePanel('p')">
    <span class="icon">👥</span>
    <span class="lbl">Viewers</span>
  </button>
  <button class="ctrl-btn" onclick="togglePanel('c')">
    <span class="icon">💬</span>
    <span class="lbl">Chat</span>
  </button>
  <button class="ctrl-btn ctrl-leave" onclick="leaveSession()">
    <span class="icon">🚪</span>
    <span class="lbl">Leave</span>
  </button>
</div>

<div class="toast" id="toast"><span id="toastIcon">✓</span> <span id="toastMsg"></span></div>

<script>
/* ─────────────────────────────────────────────
   LIVEKIT CONFIGURATION
   ───────────────────────────────────────────── */
const LIVEKIT_URL = 'wss://naluask.com/livekit';
const TOKEN_ENDPOINT = 'https://naluask.com/api/livekit/viewer-token';
const TENANT_ID = 'ncore';

/* ─── STATE ─── */
let micEnabled = true, camEnabled = true, handRaised = false;
let panelOpen = null, activeTab = 'p';
let localStream = null, room = null;
let viewerName = '';

/* ─── PRE-FILL INITIALS ─── */
document.getElementById('viewerName').addEventListener('input', function() {
  const initials = this.value.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?';
  document.getElementById('previewAvatar').textContent = initials;
  document.getElementById('pipAvatar').textContent = initials;
});

/* ─── JOIN CAMERA PREVIEW ─── */
let joinCamOn = true, joinMicOn = true, previewStream = null;

async function startPreview() {
  try {
    previewStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    const box = document.getElementById('previewBox');
    const vid = document.createElement('video');
    vid.autoplay = true; vid.muted = true; vid.playsInline = true;
    vid.srcObject = previewStream;
    vid.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    document.getElementById('previewAvatar').style.display = 'none';
    box.prepend(vid);
  } catch(e) {}
}
startPreview();

function toggleJoinCam() {
  joinCamOn = !joinCamOn;
  const btn = document.getElementById('joinCamBtn');
  btn.textContent = joinCamOn ? '📹 Camera On' : '🚫 Camera Off';
  btn.className = 'cam-toggle' + (joinCamOn ? '' : ' off');
  if (previewStream) previewStream.getVideoTracks().forEach(t => t.enabled = joinCamOn);
}
function toggleJoinMic() {
  joinMicOn = !joinMicOn;
  const btn = document.getElementById('joinMicBtn');
  btn.textContent = joinMicOn ? '🎤 Mic On' : '🔇 Mic Off';
  btn.className = 'cam-toggle' + (joinMicOn ? '' : ' off');
}

/* ─── JOIN SESSION ─── */
async function joinSession() {
  viewerName = document.getElementById('viewerName').value.trim() || 'Viewer';
  const initials = viewerName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('pipAvatar').textContent = initials;
  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('roomBody').style.display = 'flex';
  document.getElementById('controlBar').style.display = 'flex';
  if (previewStream) previewStream.getTracks().forEach(t => t.stop());
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: joinCamOn, audio: joinMicOn });
    const pip = document.getElementById('selfPipVideo');
    pip.srcObject = localStream;
    pip.style.display = 'block';
    document.getElementById('pipAvatar').style.display = 'none';
    if (!joinCamOn) { localStream.getVideoTracks().forEach(t => t.enabled = false); camEnabled = false; updateCamUI(); }
    if (!joinMicOn) { localStream.getAudioTracks().forEach(t => t.enabled = false); micEnabled = false; updateMicUI(); }
  } catch(e) {}
  addViewer(viewerName, initials, '#17a186', true);
  simulateRoom();
  tryLiveKit(viewerName, initials);
}

/* ─── LIVEKIT (viewer) ─── */
async function tryLiveKit(name, initials) {
  if (typeof LivekitClient === 'undefined') return;
  try {
    const resp = await fetch(TOKEN_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: 'session_demo', viewerName: name, tenantId: TENANT_ID })
    });
    const { token } = await resp.json();
    room = new LivekitClient.Room();
    await room.connect(LIVEKIT_URL, token);
    if (localStream) {
      const [vt, at] = await Promise.all([LivekitClient.createLocalVideoTrack(), LivekitClient.createLocalAudioTrack()]);
      if (camEnabled) await room.localParticipant.publishTrack(vt);
      if (micEnabled) await room.localParticipant.publishTrack(at);
    }
    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
      if (track.kind === 'video') {
        const vid = document.getElementById('presenterVideo');
        track.attach(vid);
        vid.style.display = 'block';
        document.getElementById('waitingMsg').style.display = 'none';
        document.getElementById('presenterLabel').style.display = 'flex';
      }
    });
  } catch(e) {}
}

/* ─── SIMULATE HOST VIDEO ─── */
function simulateRoom() {
  setTimeout(() => {
    document.getElementById('waitingMsg').style.display = 'none';
    document.getElementById('presenterLabel').style.display = 'flex';
    addChat('FitPro Academy (Host)', 'Welcome everyone! Let\'s get started 🔥');
  }, 2000);
  const demoViewers = [
    {n:'Dr. Maya Torres',i:'MT',c:'#7c3aed'},{n:'Prof. James Okafor',i:'JO',c:'#0891b2'},
    {n:'Dr. Renée Marshall',i:'RM',c:'#065f46'},{n:'Marcus Williams',i:'MW',c:'#9a3412'},
    {n:'Jennifer Amara',i:'JA',c:'#1d4ed8'},{n:'Carlos Rivera',i:'CR',c:'#6d28d9'},
  ];
  demoViewers.forEach((v,i) => setTimeout(() => addViewer(v.n,v.i,v.c), i * 1800 + 1000));
  const msgs = [
    [3000,'Alex K.','Let\'s GO! 🙌'],
    [5500,'Maria T.','This keynote is exactly what our institution needs.'],
    [9000,'Sam R.','Question: will this session be recorded for our team?'],
    [13000,'Jordan L.','Incredible energy in this room today.'],
    [18000,'FitPro Academy (Host)','Yes — recordings will be added to the VIBE platform after the session.'],
    [22000,'Chris P.','Thank you! This is such an important conversation.'],
  ];
  msgs.forEach(([delay, sender, body]) => setTimeout(() => addChat(sender, body), delay));
}

/* ─── VIEWERS LIST ─── */
function addViewer(name, initials, color, isSelf = false) {
  const list = document.getElementById('viewerList');
  const div = document.createElement('div');
  div.className = 'participant-item';
  div.innerHTML = `<div class="p-avatar" style="background:${color}">${initials}</div>
    <div class="p-name">${name}${isSelf ? ' (You)' : ''}</div>`;
  list.appendChild(div);
}

/* ─── CHAT ─── */
function addChat(sender, body, isSelf = false) {
  const list = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (isSelf ? ' self' : '');
  div.innerHTML = `<div class="sender">${sender}</div><div class="body">${body}</div>`;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  addChat(viewerName + ' (You)', msg, true);
  input.value = '';
  if (room) room.localParticipant.publishData(new TextEncoder().encode(JSON.stringify({type:'chat',sender:viewerName,body:msg})), LivekitClient.DataPacket_Kind.RELIABLE);
}
function sendOnEnter(e) { if (e.key === 'Enter') sendChat(); }

/* ─── MIC ─── */
function toggleMic() {
  micEnabled = !micEnabled;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  if (room) room.localParticipant.setMicrophoneEnabled(micEnabled);
  updateMicUI();
}
function updateMicUI() {
  document.getElementById('micIcon').textContent = micEnabled ? '🎤' : '🔇';
  document.getElementById('micLbl').textContent = micEnabled ? 'Mute' : 'Unmute';
  document.getElementById('btnMic').className = 'ctrl-btn' + (micEnabled ? '' : ' off');
}

/* ─── CAMERA ─── */
function toggleCam() {
  camEnabled = !camEnabled;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
  if (room) room.localParticipant.setCameraEnabled(camEnabled);
  updateCamUI();
}
function updateCamUI() {
  const pip = document.getElementById('selfPipVideo');
  pip.style.display = camEnabled ? 'block' : 'none';
  document.getElementById('camIcon').textContent = camEnabled ? '📹' : '🚫';
  document.getElementById('camLbl').textContent = camEnabled ? 'Stop Video' : 'Start Video';
  document.getElementById('btnCam').className = 'ctrl-btn' + (camEnabled ? '' : ' off');
}

/* ─── RAISE HAND ─── */
function raiseHand() {
  handRaised = !handRaised;
  const btn = document.getElementById('btnHand');
  btn.className = 'ctrl-btn ctrl-hand' + (handRaised ? ' raised' : '');
  document.getElementById('handLbl').textContent = handRaised ? 'Lower Hand' : 'Raise Hand';
  if (handRaised) showToast('Hand raised — the host can see you ✋', '✋');
  if (room) room.localParticipant.publishData(new TextEncoder().encode(JSON.stringify({type:'hand',raised:handRaised,name:viewerName})), LivekitClient.DataPacket_Kind.RELIABLE);
}

/* ─── PANEL ─── */
function togglePanel(tab) {
  const panel = document.getElementById('sidePanel');
  if (panelOpen === tab) {
    panel.classList.remove('open');
    panelOpen = null;
  } else {
    panel.classList.add('open');
    panelOpen = tab;
    switchTab(tab);
  }
}
function switchTab(tab) {
  document.getElementById('panelP').style.display = tab === 'p' ? 'block' : 'none';
  document.getElementById('panelC').style.display = tab === 'c' ? 'flex' : 'none';
  document.getElementById('tabP').className = 'panel-tab' + (tab === 'p' ? ' active' : '');
  document.getElementById('tabC').className = 'panel-tab' + (tab === 'c' ? ' active' : '');
  if (!document.getElementById('sidePanel').classList.contains('open')) {
    document.getElementById('sidePanel').classList.add('open');
    panelOpen = tab;
  }
  activeTab = tab;
}

/* ─── LEAVE ─── */
function leaveSession() {
  if (!confirm('Leave this session?')) return;
  if (room) room.disconnect();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  window.location.href = 'ncore-vibe-viewer.html';
}

/* ─── TOAST ─── */
function showToast(msg, icon = '✓') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon;
  t.style.display = 'flex';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
