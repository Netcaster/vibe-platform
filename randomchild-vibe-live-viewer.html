<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randomchild — Live Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { margin:0;padding:0;box-sizing:border-box; }
:root {
  --bg:#07090f; --navy:#0d1117; --card:#111827; --card2:#161f2e;
  --purple:#7c3aed; --pm:#6d28d9; --pl:#a78bfa; --plx:#c4b5fd;
  --text:#f1f0fe; --muted:rgba(196,181,253,.5);
  --border:rgba(124,58,237,.18); --border2:rgba(124,58,237,.38);
  --radius:12px;
}
html,body { height:100%;overflow:hidden; }
body { font-family:'Inter',sans-serif;background:#030507;color:var(--text);display:flex;flex-direction:column; }

/* JOIN SCREEN */
.join-screen { position:fixed;inset:0;background:#030507;display:flex;align-items:center;justify-content:center;z-index:300;padding:24px; }
.join-card { background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px;max-width:460px;width:100%;text-align:center; }
.join-logo { font-size:18px;font-weight:800;color:#fff;margin-bottom:28px; }
.join-logo span { color:var(--pl); }
.join-title { font-size:24px;font-weight:800;margin-bottom:8px; }
.join-sub { font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6; }
.preview-box { aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;margin-bottom:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border); }
.preview-av { width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pm));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff; }
.preview-box video { width:100%;height:100%;object-fit:cover; }
.name-input { width:100%;background:var(--navy);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:15px;padding:13px 16px;outline:none;margin-bottom:16px;transition:border-color .2s; }
.name-input:focus { border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.12); }
.name-input::placeholder { color:var(--muted); }
.cam-row { display:flex;gap:10px;justify-content:center;margin-bottom:22px; }
.cam-btn { display:flex;align-items:center;gap:7px;background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:10px;padding:9px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);transition:all .2s; }
.cam-btn.off { background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171; }
.cam-btn:hover { border-color:var(--border2); }
.join-btn { width:100%;padding:15px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:linear-gradient(135deg,var(--purple),var(--pm));color:#fff;transition:all .2s; }
.join-btn:hover { transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,.45); }

/* TOP BAR */
.topbar { height:54px;background:rgba(3,5,7,.96);border-bottom:1px solid rgba(124,58,237,.15);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:10;display:none; }
.topbar-left { display:flex;align-items:center;gap:14px; }
.logo { font-size:16px;font-weight:800;color:#fff; }
.logo span { color:var(--pl); }
@keyframes livepulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
.live-badge { display:flex;align-items:center;gap:7px;background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.38);border-radius:100px;padding:3px 11px;font-size:11px;font-weight:700;color:#f87171; }
.live-badge-dot { width:7px;height:7px;border-radius:50%;background:#ef4444;animation:livepulse 1.8s infinite; }
.sess-name { font-size:13px;font-weight:600;color:var(--text); }
.topbar-right { display:flex;align-items:center;gap:12px; }
.viewer-ct { font-size:13px;color:var(--muted); }

/* ROOM */
.room-body { flex:1;display:flex;overflow:hidden;display:none; }
.video-area { flex:1;display:flex;flex-direction:column;padding:14px;gap:10px;overflow:hidden; }
.presenter-wrap { flex:1;background:#000;border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center; }
.presenter-wrap video { width:100%;height:100%;object-fit:cover; }
.waiting-msg { display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--muted); }
.waiting-av { width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pm));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff; }
.host-label { position:absolute;bottom:12px;left:12px;background:rgba(3,5,7,.85);backdrop-filter:blur(6px);border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600;display:none; }
.self-pip { position:absolute;bottom:12px;right:12px;width:130px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;border:2px solid rgba(124,58,237,.45);background:var(--card);display:flex;align-items:center;justify-content:center; }
.self-pip video { width:100%;height:100%;object-fit:cover; }
.pip-av { font-size:16px;font-weight:700;color:#fff; }

/* SIDEBAR PANEL */
.side-panel { width:0;overflow:hidden;transition:width .25s ease;flex-shrink:0;background:rgba(3,5,7,.96);border-left:1px solid rgba(124,58,237,.12);display:flex;flex-direction:column; }
.side-panel.open { width:280px; }
.panel-tabs { display:flex;border-bottom:1px solid rgba(124,58,237,.12);flex-shrink:0; }
.p-tab { flex:1;padding:13px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;font-family:inherit;transition:all .2s; }
.p-tab.active { color:var(--pl);border-bottom:2px solid var(--pl); }
.p-body { flex:1;overflow-y:auto;padding:14px; }
.chat-msgs { display:flex;flex-direction:column;gap:10px; }
.chat-msg .sndr { font-size:11px;font-weight:700;color:var(--pl);margin-bottom:3px; }
.chat-msg.self .sndr { color:#34d399;text-align:right; }
.chat-msg .body { font-size:13px;background:rgba(124,58,237,.08);border-radius:10px 10px 10px 2px;padding:8px 12px;line-height:1.4; }
.chat-msg.self .body { background:rgba(16,185,129,.1);border-radius:10px 10px 2px 10px;text-align:right; }
.chat-input-wrap { display:flex;gap:7px;padding:10px 0 0;border-top:1px solid rgba(124,58,237,.1);margin-top:8px;flex-shrink:0; }
.chat-input { flex:1;background:rgba(13,17,27,.9);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;outline:none; }
.chat-input:focus { border-color:var(--purple); }
.chat-input::placeholder { color:var(--muted); }
.send-btn { background:linear-gradient(135deg,var(--purple),var(--pm));border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0; }

/* CONTROLS */
.controls { height:72px;background:rgba(3,5,7,.98);border-top:1px solid rgba(124,58,237,.12);display:none;align-items:center;justify-content:center;gap:10px;flex-shrink:0;padding:0 20px; }
.ctrl { display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(13,17,27,.9);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:9px 16px;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text);min-width:56px; }
.ctrl:hover { background:rgba(124,58,237,.1);border-color:var(--border2); }
.ctrl.off { background:rgba(30,10,10,.9);border-color:rgba(239,68,68,.3);color:#f87171; }
.ctrl.hand-raised { background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.35);color:#facc15; }
.ctrl .icon { font-size:19px;line-height:1; }
.ctrl .lbl { font-size:10px;font-weight:600;letter-spacing:.03em; }
.ctrl-leave { background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:#f87171;margin-left:14px; }
.ctrl-leave:hover { background:rgba(220,38,38,.22); }
.toast { position:fixed;bottom:84px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:13px 18px;display:none;align-items:center;gap:10px;font-size:13px;z-index:999; }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div class="join-screen" id="joinScreen">
  <div class="join-card">
    <div class="join-logo">Randomchild <span>VIBE</span></div>
    <div class="preview-box" id="previewBox">
      <video id="previewVid" autoplay muted playsinline style="display:none"></video>
      <div class="preview-av" id="previewAv"></div>
    </div>
    <div class="join-title">Ready to join?</div>
    <div class="join-sub">Enter your name and choose your camera and mic settings before joining.</div>
    <input class="name-input" id="viewerName" placeholder="Your name…" oninput="updateInitials(this.value)" />
    <div class="cam-row">
      <button class="cam-btn" id="camBtn" onclick="toggleCam()">📹 Camera On</button>
      <button class="cam-btn" id="micBtn" onclick="toggleMic0()">🎤 Mic On</button>
    </div>
    <button class="join-btn" onclick="joinRoom()">Join Session →</button>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="logo">Randomchild <span>VIBE</span></div>
    <div class="live-badge"><div class="live-badge-dot"></div>LIVE</div>
    <div class="sess-name" id="sessName">Live Session</div>
  </div>
  <div class="topbar-right">
    <div class="viewer-ct">👥 <span id="viewerCount">1</span> viewers</div>
  </div>
</div>

<!-- ROOM BODY -->
<div class="room-body" id="roomBody">
  <div class="video-area">
    <div class="presenter-wrap" id="presenterWrap">
      <video id="presenterVid" autoplay playsinline style="display:none"></video>
      <div class="waiting-msg" id="waitingMsg">
        <div class="waiting-av">RC</div>
        <span>Waiting for host to start their video…</span>
      </div>
      <div class="host-label" id="hostLabel">Randomchild (Host)</div>
      <div class="self-pip" id="selfPip">
        <video id="selfPipVid" autoplay muted playsinline style="display:none"></video>
        <div class="pip-av" id="pipAv"></div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-tabs">
      <button class="p-tab active" id="tabC" onclick="switchTab('c')">💬 Chat</button>
      <button class="p-tab" id="tabP" onclick="switchTab('p')">👥 Viewers</button>
    </div>
    <div class="p-body" id="panelC" style="display:flex;flex-direction:column;height:100%;padding-bottom:0">
      <div style="flex:1;overflow-y:auto">
        <div class="chat-msgs" id="chatMsgs"></div>
      </div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chatInput" placeholder="Message…" onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
    <div class="p-body" id="panelP" style="display:none">
      <div id="viewerList"></div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls" id="controls">
  <button class="ctrl" id="btnMic" onclick="toggleMicRoom()">
    <span class="icon" id="micIcon">🎤</span>
    <span class="lbl" id="micLbl">Mute</span>
  </button>
  <button class="ctrl" id="btnCam" onclick="toggleCamRoom()">
    <span class="icon" id="camIcon">📹</span>
    <span class="lbl" id="camLbl">Stop Video</span>
  </button>
  <button class="ctrl" id="btnHand" onclick="raiseHand()">
    <span class="icon">✋</span>
    <span class="lbl" id="handLbl">Raise Hand</span>
  </button>
  <button class="ctrl" onclick="togglePanel('c')">
    <span class="icon">💬</span>
    <span class="lbl">Chat</span>
  </button>
  <button class="ctrl" onclick="togglePanel('p')">
    <span class="icon">👥</span>
    <span class="lbl">Viewers</span>
  </button>
  <button class="ctrl ctrl-leave" onclick="leaveSession()">
    <span class="icon">🚪</span>
    <span class="lbl">Leave</span>
  </button>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const LIVEKIT_URL = 'wss://naluask.com/livekit';
const TOKEN_ENDPOINT = 'https://naluask.com/api/livekit/viewer-token';
const TENANT_ID = 'randomchild';

let micEnabled=true, camEnabled=true, handRaised=false;
let panelOpen=null, localStream=null, previewStream=null;
let camOn0=true, micOn0=true, viewerName='';

function updateInitials(v) {
  const i=v.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';
  document.getElementById('previewAv').textContent=i;
  document.getElementById('pipAv').textContent=i;
}

async function startPreview() {
  try {
    previewStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    const vid=document.getElementById('previewVid');
    vid.srcObject=previewStream; vid.style.display='block';
    document.getElementById('previewAv').style.display='none';
  } catch(e){}
}
startPreview();

function toggleCam() {
  camOn0=!camOn0;
  const btn=document.getElementById('camBtn');
  btn.textContent=camOn0?'📹 Camera On':'🚫 Camera Off';
  btn.className='cam-btn'+(camOn0?'':' off');
  if(previewStream) previewStream.getVideoTracks().forEach(t=>t.enabled=camOn0);
}
function toggleMic0() {
  micOn0=!micOn0;
  const btn=document.getElementById('micBtn');
  btn.textContent=micOn0?'🎤 Mic On':'🔇 Mic Off';
  btn.className='cam-btn'+(micOn0?'':' off');
}

async function joinRoom() {
  viewerName=document.getElementById('viewerName').value.trim()||'Viewer';
  const initials=viewerName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('pipAv').textContent=initials;
  if(previewStream) previewStream.getTracks().forEach(t=>t.stop());
  document.getElementById('joinScreen').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('roomBody').style.display='flex';
  document.getElementById('controls').style.display='flex';
  try {
    localStream=await navigator.mediaDevices.getUserMedia({video:camOn0,audio:micOn0});
    const pip=document.getElementById('selfPipVid');
    pip.srcObject=localStream; pip.style.display='block';
    document.getElementById('pipAv').style.display='none';
    if(!camOn0) { localStream.getVideoTracks().forEach(t=>t.enabled=false); camEnabled=false; updateCamUI(); }
    if(!micOn0) { localStream.getAudioTracks().forEach(t=>t.enabled=false); micEnabled=false; updateMicUI(); }
  } catch(e){}
  addViewer(viewerName+' (You)','#7c3aed');
  setTimeout(()=>{
    document.getElementById('waitingMsg').style.display='none';
    document.getElementById('hostLabel').style.display='flex';
    addChatMsg('Randomchild (Host)','Welcome! Glad you\'re here 🎉');
  },2000);
  let c=1;
  const grow=setInterval(()=>{
    if(c>=12){clearInterval(grow);return;}
    c+=Math.floor(Math.random()*2)+1; c=Math.min(c,12);
    document.getElementById('viewerCount').textContent=c;
  },5000);
}

function toggleMicRoom() {
  micEnabled=!micEnabled;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=micEnabled);
  updateMicUI();
}
function updateMicUI() {
  document.getElementById('micIcon').textContent=micEnabled?'🎤':'🔇';
  document.getElementById('micLbl').textContent=micEnabled?'Mute':'Unmute';
  document.getElementById('btnMic').className='ctrl'+(micEnabled?'':' off');
}
function toggleCamRoom() {
  camEnabled=!camEnabled;
  if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=camEnabled);
  const pip=document.getElementById('selfPipVid');
  pip.style.display=camEnabled?'block':'none';
  document.getElementById('camIcon').textContent=camEnabled?'📹':'🚫';
  document.getElementById('camLbl').textContent=camEnabled?'Stop Video':'Start Video';
  document.getElementById('btnCam').className='ctrl'+(camEnabled?'':' off');
}
function raiseHand() {
  handRaised=!handRaised;
  document.getElementById('btnHand').className='ctrl'+(handRaised?' hand-raised':'');
  document.getElementById('handLbl').textContent=handRaised?'Lower Hand':'Raise Hand';
  if(handRaised) showToast('✋ Hand raised — the host can see you');
}
function togglePanel(tab) {
  const p=document.getElementById('sidePanel');
  if(panelOpen===tab){p.classList.remove('open');panelOpen=null;}
  else{p.classList.add('open');panelOpen=tab;switchTab(tab);}
}
function switchTab(tab) {
  document.getElementById('panelC').style.display=tab==='c'?'flex':'none';
  document.getElementById('panelP').style.display=tab==='p'?'block':'none';
  document.getElementById('tabC').className='p-tab'+(tab==='c'?' active':'');
  document.getElementById('tabP').className='p-tab'+(tab==='p'?' active':'');
  if(!document.getElementById('sidePanel').classList.contains('open')){
    document.getElementById('sidePanel').classList.add('open');panelOpen=tab;
  }
}
function addChatMsg(sender,body,isSelf=false) {
  const list=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='chat-msg'+(isSelf?' self':'');
  div.innerHTML='<div class="sndr">'+sender+'</div><div class="body">'+body+'</div>';
  list.appendChild(div); list.scrollTop=list.scrollHeight;
}
function sendChat() {
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim(); if(!msg) return;
  addChatMsg(viewerName+' (You)',msg,true); inp.value='';
}
function addViewer(name,color) {
  const list=document.getElementById('viewerList');
  const div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(124,58,237,.07);font-size:13px;';
  const av=document.createElement('div');
  av.style.cssText='width:28px;height:28px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;';
  av.textContent=name.slice(0,2).toUpperCase();
  div.append(av,document.createTextNode(name));
  list.appendChild(div);
}
function leaveSession() {
  if(!confirm('Leave this session?')) return;
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  window.location.href='randomchild-vibe-viewer.html';
}
function showToast(msg) {
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.style.display='flex';
  setTimeout(()=>{t.style.display='none'},4000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
</body>
</html>
